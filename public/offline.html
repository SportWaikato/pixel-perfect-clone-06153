<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Karawhiua</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f0;
        color: #333333;
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial,
          sans-serif;
        text-align: center;
        padding: 1.5rem;
      }
      .card {
        max-width: 24rem;
      }
      img {
        width: 96px;
        height: 96px;
      }
      h1 {
        color: #1b5e4b;
        font-size: 1.5rem;
        margin: 1rem 0 0.5rem;
      }
      p {
        font-size: 0.95rem;
        line-height: 1.5;
        margin: 0 0 1.25rem;
      }
      button {
        background: #1b5e4b;
        color: #ffffff;
        border: 0;
        border-radius: 0.625rem;
        padding: 0.65rem 1.5rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/KarawhiuaLogo.png" alt="Karawhiua" />
      <h1>You're offline</h1>
      <p>
        Karawhiua needs an internet connection to load new pages. Check your connection and try
        again — your logged activities are safe.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
