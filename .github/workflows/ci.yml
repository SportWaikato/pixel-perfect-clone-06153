name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx tsc --noEmit

      - name: Get changed TS files
        id: files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx')
          else
            FILES=$(git diff --name-only HEAD~1 HEAD -- '*.ts' '*.tsx' 2>/dev/null || echo "")
          fi
          # GITHUB_OUTPUT is line-oriented: a multi-line value breaks parsing
          # ("Invalid format ..."), so flatten the list to one line. Deleted
          # files are excluded so eslint doesn't fail on missing paths.
          FILES=$(printf '%s\n' "$FILES" | while read -r f; do [ -f "$f" ] && printf '%s ' "$f"; done)
          echo "FILES=$FILES" >> "$GITHUB_OUTPUT"

      - name: Lint changed files
        if: steps.files.outputs.FILES != ''
        run: npx eslint ${{ steps.files.outputs.FILES }}

      - run: npx vitest run
