name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx tsc --noEmit

      - name: Get changed TS files
        id: files
        run: |
          # --diff-filter=d excludes deleted files so eslint never gets a
          # missing path; tr flattens to one line because GITHUB_OUTPUT is
          # line-oriented and a multi-line value breaks parsing.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=d origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' | tr '\n' ' ')
          else
            FILES=$(git diff --name-only --diff-filter=d HEAD~1 HEAD -- '*.ts' '*.tsx' 2>/dev/null | tr '\n' ' ' || echo "")
          fi
          echo "FILES=$FILES" >> "$GITHUB_OUTPUT"

      - name: Lint changed files
        if: steps.files.outputs.FILES != ''
        run: npx eslint ${{ steps.files.outputs.FILES }}

      - run: npx vitest run
